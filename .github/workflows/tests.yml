name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        # Bun auto-sets NODE_ENV=test, which auto-loads `.env.test` from the
        # repo. That file provides a placeholder DATABASE_DSN so envalid is
        # satisfied without needing a real database.
        run: bun test

      - name: Build
        run: bun run build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # ubuntu-latest runners have Docker pre-installed; Testcontainers boots
    # its own Postgres on demand, so no `services:` block is needed.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests
        run: bun run test:int
